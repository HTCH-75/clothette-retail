<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Clothette Retail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="public/style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">The Clothette <span>Retail</span></div>
    <div class="login-sub">Plateforme de gestion des stocks</div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="votre@email.com" value="admin@clothette.com">
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" placeholder="••••••••" value="••••••••">
    </div>
    <button class="btn-login" onclick="doLogin()">Se connecter</button>
    <div class="login-hint">
      <span onclick="setDemo('admin')">Admin →</span>
      <span onclick="setDemo('brand')">Vue marque →</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- NAV -->
  <nav class="topnav">
    <div class="nav-logo">The Clothette <span>Retail</span></div>
    <div class="nav-center" id="navBrandBadge"></div>
    <div class="nav-right">
      <span class="nav-role" id="navRole"></span>
      <div class="avatar" id="navAvatar"></div>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </nav>

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- MAIN -->
    <main class="main-content" id="mainContent"></main>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="public/data.js"></script>
<script src="public/app.js"></script>
</body>
</html>
