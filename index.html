<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Clothette Retail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #F2F2F2;
      --bg2:     #FFFFFF;
      --bg3:     #F7F7F7;
      --bg4:     #E8E8E8;
      --border:  #DDDDDД;
      --border2: #BBBBBB;
      --text:    #111111;
      --text2:   #444444;
      --text3:   #888888;
      --accent:  #1A1A1A;
      --accent-light: #EFEFEF;
      --accent-text:  #111111;
      --success:     #2E6B4A;
      --success-bg:  #EDF5F0;
      --warning:     #8A6420;
      --warning-bg:  #FBF5E8;
      --danger:      #A03030;
      --danger-bg:   #FAF0F0;
      --info:        #2A5A8A;
      --info-bg:     #EDF2FA;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans:  'DM Sans', sans-serif;
      --r: 6px; --rl: 8px;
    }
    html, body { height: 100%; font-family: var(--font-sans); color: var(--text); background: var(--bg); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
    .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 2.75rem; width: 100%; max-width: 360px; }
    .login-logo { font-family: var(--font-serif); font-size: 24px; font-weight: 300; margin-bottom: .2rem; letter-spacing: .06em; text-transform: uppercase; color: var(--text); }
    .login-logo em { color: var(--accent); font-style: italic; text-transform: none; font-weight: 400; }
    .login-sub { font-size: 10px; color: var(--text3); margin-bottom: 2rem; letter-spacing: .1em; text-transform: uppercase; }
    .login-divider { height: 1px; background: var(--border); margin-bottom: 1.75rem; }
    .login-field { margin-bottom: .85rem; }
    .login-field label { display: block; font-size: 10px; font-weight: 400; color: var(--text3); margin-bottom: .35rem; letter-spacing: .08em; text-transform: uppercase; }
    .login-field input { width: 100%; border: 1px solid var(--border); border-radius: var(--r); padding: 9px 12px; font-size: 13px; font-family: var(--font-sans); outline: none; transition: border-color .15s; background: var(--bg3); color: var(--text); }
    .login-field input:focus { border-color: var(--accent); background: var(--bg2); }
    .login-field input::placeholder { color: var(--text3); }
    .btn-login { width: 100%; background: var(--text); color: var(--bg2); border: none; border-radius: var(--r); padding: 11px; font-size: 12px; font-weight: 400; font-family: var(--font-sans); cursor: pointer; margin-top: .75rem; transition: opacity .15s; letter-spacing: .08em; text-transform: uppercase; }
    .btn-login:hover { opacity: .85; }
    .login-hint { display: flex; gap: 1.5rem; margin-top: 1.25rem; font-size: 11px; color: var(--text3); justify-content: center; }
    .login-hint span { cursor: pointer; transition: color .15s; }
    .login-hint span:hover { color: var(--accent); }

    /* TOPNAV */
    .topnav { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: var(--font-serif); font-size: 15px; font-weight: 300; letter-spacing: .1em; text-transform: uppercase; color: var(--text); }
    .nav-logo em { color: var(--accent); font-style: italic; text-transform: none; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-role { font-size: 10px; background: var(--accent-light); color: var(--accent-text); padding: 3px 10px; border-radius: 20px; font-weight: 400; letter-spacing: .06em; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--accent-text); }
    .btn-logout { background: none; border: 1px solid var(--border); border-radius: var(--r); padding: 5px 12px; font-size: 11px; font-family: var(--font-sans); cursor: pointer; color: var(--text3); transition: all .15s; letter-spacing: .04em; }
    .btn-logout:hover { border-color: var(--border2); color: var(--text2); }

    /* LAYOUT */
    .app-layout { display: flex; min-height: calc(100vh - 50px); }
    .sidebar { width: 210px; border-right: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; padding: .75rem 0; overflow-y: auto; }
    .main-content { flex: 1; padding: 2rem; background: var(--bg); overflow-y: auto; }

    /* SIDEBAR */
    .sidebar-section { font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--text3); padding: 1rem 1.25rem .3rem; font-weight: 400; }
    .sidebar-item { display: flex; align-items: center; gap: 9px; padding: .5rem 1.25rem; font-size: 12px; cursor: pointer; color: var(--text3); border-left: 2px solid transparent; transition: all .12s; letter-spacing: .02em; }
    .sidebar-item:hover { color: var(--text2); background: var(--bg3); }
    .sidebar-item.active { color: var(--text); font-weight: 400; border-left-color: var(--accent); background: var(--bg3); }
    .brand-pill { display: flex; align-items: center; gap: 8px; padding: .4rem .75rem; font-size: 12px; cursor: pointer; border-radius: var(--r); margin: 2px .5rem; transition: all .12s; color: var(--text3); }
    .brand-pill:hover { background: var(--bg3); color: var(--text2); }
    .sidebar-divider { height: 1px; background: var(--border); margin: .5rem 1.25rem; }
    .store-badge { display: inline-flex; padding: 1px 7px; border-radius: 20px; font-size: 9px; font-weight: 400; margin-left: auto; letter-spacing: .04em; }

    /* PAGE */
    .page-title { font-family: var(--font-serif); font-size: 28px; font-weight: 300; margin-bottom: .15rem; color: var(--text); letter-spacing: .04em; }
    .page-sub { font-size: 11px; color: var(--text3); margin-bottom: 1.5rem; letter-spacing: .06em; text-transform: uppercase; }

    /* METRICS */
    .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
    .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); padding: .85rem 1rem; }
    .metric-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .4rem; }
    .metric-value { font-size: 26px; font-weight: 200; line-height: 1.1; font-family: var(--font-serif); letter-spacing: -.01em; }

    /* CARDS */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.1rem 1.25rem; margin-bottom: .85rem; }
    .card-title { font-size: 9px; font-weight: 400; margin-bottom: .85rem; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; }
    .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; margin-bottom: .85rem; }
    .grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: .85rem; }

    /* TABLE */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; margin-bottom: .85rem; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: var(--bg3); padding: 9px 16px; text-align: left; font-size: 9px; font-weight: 400; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); }

    /* BADGES */
    .badge { display: inline-flex; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 400; letter-spacing: .03em; }
    .badge-ok     { background: var(--success-bg); color: var(--success); }
    .badge-warn   { background: var(--warning-bg); color: var(--warning); }
    .badge-danger { background: var(--danger-bg);  color: var(--danger); }
    .badge-info   { background: var(--info-bg);    color: var(--info); }
    .badge-accent { background: var(--accent-light); color: var(--accent-text); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; padding: 7px 16px; border-radius: var(--r); font-size: 11px; font-weight: 400; font-family: var(--font-sans); cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); transition: all .15s; letter-spacing: .04em; }
    .btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
    .btn-sm { padding: 3px 10px; font-size: 11px; border-radius: 4px; }
    .btn-primary { background: var(--text); color: var(--bg2); border-color: var(--text); }
    .btn-primary:hover { opacity: .85; }

    /* FORMS */
    .search-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-input { border: 1px solid var(--border); border-radius: var(--r); padding: 7px 12px; font-size: 12px; font-family: var(--font-sans); background: var(--bg2); color: var(--text); outline: none; min-width: 180px; flex: 1; transition: border-color .15s; }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--accent); }
    .filter-select { border: 1px solid var(--border); border-radius: var(--r); padding: 7px 12px; font-size: 12px; font-family: var(--font-sans); background: var(--bg2); color: var(--text); outline: none; cursor: pointer; }

    /* DROP ZONES */
    .drop-zone { border: 1px dashed var(--border2); border-radius: var(--rl); padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all .15s; background: var(--bg3); }
    .drop-zone:hover { background: var(--accent-light); border-color: var(--accent); }
    .drop-zone-sm { border: 1px dashed var(--border); border-radius: var(--r); padding: 1.25rem; text-align: center; cursor: pointer; background: var(--bg3); transition: all .15s; }
    .drop-zone-sm:hover { background: var(--accent-light); border-color: var(--accent); }

    /* MISC */
    .section-label { font-size: 9px; font-weight: 400; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); margin-bottom: .6rem; margin-top: 1.25rem; }
    .alert-banner { border-radius: var(--r); padding: .75rem 1rem; font-size: 12px; margin-bottom: 1rem; }
    .bar-track { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; }
    .file-row { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.25rem; border-bottom: 1px solid var(--border); }
    .file-row:last-child { border-bottom: none; }
    .file-icon { width: 34px; height: 34px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; letter-spacing: .04em; }
    .collection-card { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.25rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); margin-bottom: 6px; }
    .mono { font-family: 'Courier New', monospace; font-size: 11px; color: var(--text2); }
    @media (max-width: 640px) { .sidebar { display: none; } .main-content { padding: 1rem; } }
  </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">The Clothette <em>Retail</em></div>
    <div class="login-sub">Stock Management Platform</div>
    <div class="login-divider"></div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="votre@email.com">
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn-login" onclick="doLogin()">Se connecter</button>
    <div class="login-hint">
      <span onclick="setDemo('admin')">Admin →</span>
      <span onclick="setDemo('brand')">Vue marque →</span>

</div>

<div id="app" style="display:none">

  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content" id="mainContent"></main>
  </div>
</div>

async function loadCatalogueFromDB(brandId, limit=5000) {
  if (!sb) return null;
  const {data,error} = await sb.from('catalogue').select('*').eq('brand_id',brandId).limit(limit);
  if (error) { console.error(error); return null; }
  return data;
}
async function loadStocksFromDB(brandId, storeId) {
  if (!sb) return null;
  const {data,error} = await sb.from('stocks').select('*, catalogue(style_name,category,size,ean)').eq('brand_id',brandId).eq('store_id',storeId);
  if (error) { console.error(error); return null; }
  return data;
}
async function loadHistoryFromDB(brandId) {
  if (!sb) return null;
  const {data,error} = await sb.from('import_history').select('*').eq('brand_id',brandId).order('created_at',{ascending:false}).limit(20);
  if (error) { console.error(error); return null; }
  return data;
}
async function logImportToDB(brandId, fileName, type, total, ok, failed, status) {
  if (!sb) return;
  await sb.from('import_history').insert({brand_id:brandId,file_name:fileName,import_type:type,lines_total:total,lines_ok:ok,lines_failed:failed,status});
}

// ─── USERS & SPACES DB ────────────────────────────────────────────────────────
async function loadUsersFromDB() {
  if (!sb) return null;
  const {data: users, error} = await sb.from('users').select('*, user_spaces(*)');
  if (error) { console.error(error); return null; }
  return users;
}

async function createUserInDB(email, password, name, role, initials, spaces) {
  if (!sb) return false;
  try {
    const {data: user, error} = await sb.from('users').insert({email, password, name, role, initials}).select().single();
    if (error) throw error;
    if (spaces && spaces.length) {
      const spaceRows = spaces.map(sp => ({
        user_id: user.id,
        space_id: sp.id,
        brand: sp.brand,
        store: sp.store,
        store_label: sp.storeLabel,
        color: sp.color,
        color_light: sp.colorLight,
        color_text: sp.colorText
      }));
      await sb.from('user_spaces').insert(spaceRows);
    }
    return true;
  } catch(e) { console.error(e); return false; }
}

async function deleteUserFromDB(email) {
  if (!sb) return false;
  const {error} = await sb.from('users').delete().eq('email', email);
  if (error) { console.error(error); return false; }
  return true;
}

async function saveStockItemToDB(spaceId, item) {
  if (!sb) return false;
  const {error} = await sb.from('stock_items').upsert({
    space_id: spaceId,
    ean: item.ref,
    ref: item.ref,
    style_name: item.style,
    size: item.size,
    category: item.cat,
    price: item.price || 0,
    quantity: item.qty,
    min_quantity: item.min,
    reassort_cmd: item.reassortCmd || 0,
    reassort_recu: item.reassortRecu || 0,
    comment: item.comment || '',
    updated_at: new Date()
  }, {onConflict: 'space_id,ref,size'});
  if (error) { console.error(error); return false; }
  return true;
}

async function loadStockItemsFromDB(spaceId) {
  if (!sb) return null;
  const {data, error} = await sb.from('stock_items').select('*').eq('space_id', spaceId);
  if (error) { console.error(error); return null; }
  return data;
}

async function initFromDB() {
  if (!sb) return;
  try {
    const users = await loadUsersFromDB();
    if (!users) return;
    users.forEach(u => {
      if (u.email === 'admin@clothette.com') return;
      const spaces = u.user_spaces || [];
      USERS[u.email] = {
        pass: u.password, role: u.role, name: u.name, initials: u.initials,
        brand: spaces[0]?.space_id || '',
        spaces: spaces.map(s => s.space_id)
      };
      spaces.forEach(s => {
        if (!SPACES[s.space_id]) {
          SPACES[s.space_id] = {
            id: s.space_id, brand: s.brand, store: s.store, storeLabel: s.store_label,
            color: s.color, colorLight: s.color_light, colorText: s.color_text
          };
          STOCKS[s.space_id]  = [];
          SALES[s.space_id]   = { week:'—', total:0, returns:0, ca:0, byDay:[{l:'Lu',v:0},{l:'Ma',v:0},{l:'Me',v:0},{l:'Je',v:0},{l:'Ve',v:0},{l:'Sa',v:0},{l:'Di',v:0}], topRefs:[], sellThrough:0 };
          HISTORY[s.space_id] = [];
          MISSING[s.space_id] = [];
          SEASONS[s.space_id] = [];
        }
      });
    });
    console.log('DB users loaded ✓', Object.keys(USERS).length, 'users');
  } catch(e) { console.error('initFromDB error:', e); }
}
</script>

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUser=null, currentSpace='les-deux-glh', currentPage=null;

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function setDemo(role) {
  document.getElementById('loginEmail').value = role==='admin' ? 'admin@clothette.com' : 'lesdeux@clothette.com';
  document.getElementById('loginPass').value  = role==='admin' ? 'admin123' : 'lesdeux123';
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value.trim();
  const user  = USERS[email];
  if (!user)            { alert('Email introuvable. Utilisez admin@clothette.com'); return; }
  if (user.pass!==pass) { alert('Mot de passe incorrect. Utilisez admin123');       return; }
  currentUser  = { email, ...user };
  currentSpace = user.role==='brand' ? user.brand : 'les-deux-glh';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('navRole').textContent   = user.role==='admin' ? 'Administrateur' : 'Marque';
  document.getElementById('navAvatar').textContent = user.initials;
  const navCenter = document.getElementById('navCenter');
  if (user.role === 'brand') {
    const brandKey = user.brand || '';
    const logoKey = brandKey.includes('les-deux') ? 'les-deux' : brandKey.replace('-glh','').replace('-glce','');
    const logo = LOGOS[logoKey] || LOGOS[brandKey];
    if (logo) {
      navCenter.innerHTML = '<img src="' + logo + '" alt="' + user.name + '" style="height:26px;width:auto;object-fit:contain;display:block">';
    } else {
      navCenter.textContent = user.name;
    }
  } else {
    navCenter.textContent = '';
  }
  renderSidebar();
  navigateTo('overview');
}

function doLogout() {
  currentUser=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const isAdmin = currentUser.role==='admin';
  const isBrand = currentUser.role==='brand';
  const sp = SPACES[currentSpace];
  const pages = [
    {id:'overview',   label:"Vue d'ensemble"},
    {id:'stocks',     label:'Stocks'},
    {id:'depot',      label:'Dépôt fichiers'},
    {id:'catalogue',  label:'Catalogue'},
    {id:'historique', label:'Historique'},
    {id:'reassort',   label:'Demande réassort'},
  ];
  let html='';

  if (isAdmin) {
    html+=`<div class="sidebar-section">Administration</div>
    <div class="sidebar-item ${currentPage==='comptes'?'active':''}" onclick="navigateTo('comptes')">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="flex-shrink:0"><circle cx="6.5" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 11.5c0-2.761 2.239-5 5-5s5 2.239 5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Gestion des comptes
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Vue globale</div>
    <div class="sidebar-item ${currentPage==='global'?'active':''}" onclick="navigateTo('global')">
      <span style="font-size:12px">⊕</span> Stock consolidé
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Les Deux</div>
    <div class="brand-pill ${currentSpace==='les-deux-glh'?'active':''}" style="${currentSpace==='les-deux-glh'?'background:var(--accent-light);color:var(--accent-text)':''}" onclick="switchSpace('les-deux-glh')">
      <div style="width:8px;height:8px;border-radius:50%;background:#8A7A6E"></div>
      GL Haussmann
    </div>
    <div class="brand-pill ${currentSpace==='les-deux-glce'?'active':''}" style="${currentSpace==='les-deux-glce'?'background:var(--accent-light);color:var(--accent-text)':''}" onclick="switchSpace('les-deux-glce')">
      <div style="width:8px;height:8px;border-radius:50%;background:#8A7A6E"></div>
      GL Champs-Élysées
    </div>
    <div class="sidebar-divider"></div>
    ${Object.entries(
        Object.entries(SPACES)
          .filter(([id]) => id !== 'les-deux-glh' && id !== 'les-deux-glce')
          .reduce((acc, [id, sp]) => {
            if (!acc[sp.brand]) acc[sp.brand] = [];
            acc[sp.brand].push({id, sp});
            return acc;
          }, {})
      ).map(([brand, items]) =>
        '<div class="sidebar-section">' + brand + '</div>' +
        items.map(({id, sp}) =>
          '<div class="brand-pill ' + (currentSpace===id?'active':'') + '" ' +
          'style="' + (currentSpace===id?'background:'+sp.colorLight+';color:'+sp.colorText:'') + '" ' +
          'onclick="switchSpace(\'' + id + '\')">' +
          '<div style="width:8px;height:8px;border-radius:50%;background:' + sp.color + '"></div>' +
          sp.storeLabel +
          '</div>'
        ).join('') +
        '<div class="sidebar-divider"></div>'
      ).join('')}
    `;
  }

  if (isBrand && currentUser.spaces && currentUser.spaces.length > 1) {
    html+=`<div class="sidebar-section">Vue globale</div>
    <div class="sidebar-item ${currentPage==='brand-global'?'active':''}" onclick="navigateTo('brand-global')">
      <span style="font-size:12px">⊕</span> Mes deux points de vente
    </div>
    <div class="sidebar-section">Mes points de vente</div>`;
    currentUser.spaces.forEach(spaceId => {
      const s = SPACES[spaceId];
      const isActive = currentSpace === spaceId && currentPage !== 'brand-global';
      html+=`<div class="brand-pill ${isActive?'active':''}" style="${isActive?`background:${s.colorLight};color:${s.colorText}`:''}" onclick="switchSpace('${spaceId}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${s.color}"></div>
        ${s.storeLabel}
        <span class="store-badge" style="background:${s.colorLight};color:${s.colorText}">${s.store}</span>
      </div>`;
    });
    html+=`<div class="sidebar-divider"></div>`;
  }

  html+=`<div class="sidebar-section">Navigation — ${sp.storeLabel}</div>`;
  pages.forEach(p=>{
    const isActive = currentPage===p.id;
    html+=`<div class="sidebar-item ${isActive?'active':''}" onclick="navigateTo('${p.id}')">${p.label}</div>`;
  });
  document.getElementById('sidebar').innerHTML=html;
}

function switchSpace(id){ currentSpace=id; renderSidebar(); navigateTo('overview'); }

// ─── ROUTER ───────────────────────────────────────────────────────────────────
function navigateTo(page) {
  currentPage=page; renderSidebar();
  const m=document.getElementById('mainContent');
  if(page==='global')            { m.innerHTML=pageGlobal(); setTimeout(initGlobalChart,0); }
  else if(page==='brand-global') m.innerHTML=pageBrandGlobal();
  else if(page==='overview')     { m.innerHTML=pageOverview(); setTimeout(initSalesChart,0); }
  else if(page==='stocks')    { m.innerHTML='<div style="padding:2rem;color:var(--text3)">Chargement des stocks...</div>'; pageStocks().then(html=>{ if(html) m.innerHTML=html; }); }
  else if(page==='depot')        { m.innerHTML=pageDepot(); setTimeout(bindDepot,0); }
  else if(page==='catalogue')    { m.innerHTML='<div style="padding:2rem;color:var(--text3)">Chargement...</div>'; pageCatalogueAsync().then(()=>{}); }
  else if(page==='historique')   { m.innerHTML='<div style="padding:2rem;color:var(--text3)">Chargement...</div>'; pageHistoriqueAsync().then(()=>{}); }
  else if(page==='reassort')     { m.innerHTML=pageReassort(); setTimeout(bindReassort,0); }
  else if(page==='comptes')      m.innerHTML=pageComptes();
}

// ─── BRAND GLOBAL VIEW ───────────────────────────────────────────────────────
function pageBrandGlobal() {
  const user = currentUser;
  const spaces = user.spaces.map(id => SPACES[id]);

let editMode = false;
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('btnEdit');
  if (btn) {
    btn.style.background = editMode ? 'var(--text)' : '';
    btn.style.color = editMode ? 'var(--bg2)' : '';
    btn.textContent = editMode ? '✓ Terminer' : '✎ Modifier';
  }
  const stocks = STOCKS[currentSpace]||[];
  const tbody = document.getElementById('stocksTbody');
  if (tbody) tbody.innerHTML = renderStocksRows(stocks, true);
}

function addProductRow() {
  const form = document.getElementById('addProductForm');
  if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function saveNewProduct() {
  const ref   = document.getElementById('newRef')?.value?.trim();
  const style = document.getElementById('newStyle')?.value?.trim();
  const size  = document.getElementById('newSize')?.value?.trim();
  const cat   = document.getElementById('newCat')?.value?.trim() || 'Autre';
  const price = parseFloat(document.getElementById('newPrice')?.value) || 0;
  const qty   = parseInt(document.getElementById('newQty')?.value) || 0;
  const min   = parseInt(document.getElementById('newMin')?.value) || 3;
  if (!ref || !style || !size) { alert('Référence, article et taille sont obligatoires'); return; }
  if (!STOCKS[currentSpace]) STOCKS[currentSpace] = [];
  STOCKS[currentSpace].push({ ref, style, size, cat, price, qty, min, reassortCmd:0, reassortRecu:0, comment:'' });
  document.getElementById('addProductForm').style.display = 'none';
  ['newRef','newStyle','newSize','newCat','newPrice','newQty','newMin'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value = '';
  });
  const tbody = document.getElementById('stocksTbody');
  if (tbody) tbody.innerHTML = renderStocksRows(STOCKS[currentSpace], true);
}

function saveRowEdit(i) {
  const stocks = STOCKS[currentSpace]||[];
  const r = stocks[i];
  if (!r) return;
  r.ref        = document.getElementById(`e-ref-${i}`)?.value || r.ref;
  r.style      = document.getElementById(`e-style-${i}`)?.value || r.style;
  r.size       = document.getElementById(`e-size-${i}`)?.value || r.size;
  r.cat        = document.getElementById(`e-cat-${i}`)?.value || r.cat;
  r.price      = parseFloat(document.getElementById(`e-price-${i}`)?.value) || 0;
  r.qty        = parseInt(document.getElementById(`e-qty-${i}`)?.value) || 0;
  r.min        = parseInt(document.getElementById(`e-min-${i}`)?.value) || 3;
  r.reassortCmd  = parseInt(document.getElementById(`e-rcmd-${i}`)?.value) || 0;
  r.reassortRecu = parseInt(document.getElementById(`e-rrec-${i}`)?.value) || 0;
  r.comment    = document.getElementById(`e-comment-${i}`)?.value || '';
  // Save to Supabase
  if (sb) {
    const r = stocks[i];
    sb.from('stock_items').upsert({
      space_id: currentSpace,
      ean: r.ref,
      ref: r.ref,
      style_name: r.style,
      size: r.size,
      category: r.cat,
      price: r.price || 0,
      quantity: r.qty,
      min_quantity: r.min,
      reassort_cmd: r.reassortCmd || 0,
      reassort_recu: r.reassortRecu || 0,
      comment: r.comment || '',
      updated_at: new Date()
    }, {onConflict: 'space_id,ref,size'}).then(({error}) => {
      if (error) console.error('Save error:', error);
      else console.log('Stock saved ✓');
    });
  }
  const tbody = document.getElementById('stocksTbody');
  if (tbody) tbody.innerHTML = renderStocksRows(stocks, true);
}

function deleteRow(i) {
  if (!confirm('Supprimer cette ligne ?')) return;
  STOCKS[currentSpace].splice(i, 1);
  const tbody = document.getElementById('stocksTbody');
  if (tbody) tbody.innerHTML = renderStocksRows(STOCKS[currentSpace], true);
}

function renderStocksRows(data, isAdmin){
  if (!data || !data.length) return `<tr><td colspan="12" style="text-align:center;color:var(--text3);padding:2rem">Aucun produit — les stocks seront ajoutés après l'inventaire</td></tr>`;
  return data.map((r,i) => {
    const st = r.qty===0?'danger':r.qty<r.min?'warn':'ok';
    const stLabel = st==='ok'?'En stock':st==='warn'?'Critique':'Rupture';
    const price = r.price ? r.price.toLocaleString('fr-FR') + ' €' : '—';
    if (editMode && isAdmin) {
      return `<tr style="background:var(--bg3)">
        <td><input style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:100%;font-family:monospace;background:var(--bg2)" id="e-ref-${i}" value="${r.ref}"></td>
        <td><input style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:100%;background:var(--bg2)" id="e-style-${i}" value="${r.style}"></td>
        <td><input style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:60px;background:var(--bg2)" id="e-size-${i}" value="${r.size}"></td>
        <td><input style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:80px;background:var(--bg2)" id="e-cat-${i}" value="${r.cat}"></td>
        <td><input type="number" style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:60px;background:var(--bg2)" id="e-price-${i}" value="${r.price||0}"></td>
        <td><input type="number" style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:55px;background:var(--bg2);font-weight:500" id="e-qty-${i}" value="${r.qty}"></td>
        <td><input type="number" style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:55px;background:var(--bg2)" id="e-rcmd-${i}" value="${r.reassortCmd||0}"></td>
        <td><input type="number" style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:55px;background:var(--bg2)" id="e-rrec-${i}" value="${r.reassortRecu||0}"></td>
        <td><span class="badge badge-${st}" style="font-size:10px">${stLabel}</span></td>
        <td><input style="border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;width:100%;background:var(--bg2)" id="e-comment-${i}" value="${r.comment||''}"></td>
        <td style="display:flex;gap:4px;padding:8px 6px">
          <button class="btn btn-sm btn-primary" onclick="saveRowEdit(${i})" style="padding:3px 8px;font-size:10px">✓</button>
          <button class="btn btn-sm" onclick="deleteRow(${i})" style="padding:3px 8px;font-size:10px;color:var(--danger)">✕</button>
        </td>
      </tr>`;
    }
    return `<tr>
      <td class="mono">${r.ref}</td>
      <td style="color:var(--text2)">${r.style}</td>
      <td>${r.size}</td>
      <td><span class="badge badge-accent" style="font-size:10px">${r.cat}</span></td>
      <td style="color:var(--text2)">${price}</td>
      <td style="font-weight:500;color:${r.qty===0?'var(--danger)':r.qty<r.min?'var(--warning)':'var(--text)'}">${r.qty}</td>
      <td style="color:${r.reassortCmd>0?'var(--info)':'var(--text3)'};font-weight:${r.reassortCmd>0?'500':'400'}">${r.reassortCmd||'—'}</td>
      <td style="color:${r.reassortRecu>0?'var(--success)':'var(--text3)'};font-weight:${r.reassortRecu>0?'500':'400'}">${r.reassortRecu||'—'}</td>
      <td><span class="badge badge-${st}">${stLabel}</span></td>
      <td style="font-size:11px;color:var(--text2);font-style:${r.comment?'normal':'italic'}">${r.comment||'—'}</td>
      ${isAdmin ? `<td></td>` : ''}
    </tr>`;
  }).join('');
}

function filterS(){
  const search  = document.getElementById('sSearch')?.value?.toLowerCase()||'';
  const cat     = document.getElementById('sCat')?.value||'';
  const status  = document.getElementById('sStatus')?.value||'';
  let data = STOCKS[currentSpace]||[];
  if (search) data = data.filter(r=>r.ref.toLowerCase().includes(search)||r.style.toLowerCase().includes(search));
  if (cat)    data = data.filter(r=>r.cat===cat);
  if (status) data = data.filter(r=>(r.qty===0?'danger':r.qty<r.min?'warn':'ok')===status);
  const tb = document.getElementById('stocksTbody');
  if (tb) tb.innerHTML = renderStocksRows(data, currentUser.role==='admin');
}

function renderReassortRows(stocks, rules) {
  if (!rules) {
    rules = [
      {id:1,label:'Best-seller'},{id:2,label:'Opportunité commerciale'},
      {id:3,label:'Produit complémentaire'},{id:4,label:'Rupture essentiel'},
      {id:5,label:'Commande client'},{id:6,label:'Nouveau produit/couleur'},
      {id:7,label:'NOOS'},
    ];
  }
  const search = document.getElementById('rSearch')?.value?.toLowerCase() || '';
  const filter = document.getElementById('rFilter')?.value || 'all';
  let data = stocks;
  if (search) data = data.filter(r => r.ref.toLowerCase().includes(search) || r.style.toLowerCase().includes(search));
  if (filter === 'low')  data = data.filter(r => r.qty < r.min);
  if (filter === 'zero') data = data.filter(r => r.qty === 0);
  if (!data.length) return `<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:2rem">Aucun produit trouvé</td></tr>`;
  return data.map((r,i) => {
    const st = r.qty===0?'danger':r.qty<r.min?'warn':'ok';
    const stLabel = st==='ok'?'En stock':st==='warn'?'Critique':'Rupture';
    return `<tr id="rrow-${i}">
      <td class="mono">${r.ref}</td>
      <td style="color:var(--text2)">${r.style}</td>
      <td>${r.size}</td>
      <td style="font-weight:500;color:${r.qty===0?'var(--danger)':r.qty<r.min?'var(--warning)':'var(--text)'}">${r.qty}</td>
      <td><span class="badge badge-${st}">${stLabel}</span></td>
      <td>
        <select style="border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:11px;font-family:var(--font-sans);background:var(--bg2);color:var(--text);outline:none;width:100%" id="rule-${i}" onchange="updateSummary()">
          <option value="">— Choisir —</option>
          ${rules.map(rule=>`<option value="${rule.id}">${rule.id}. ${rule.label}</option>`).join('')}
        </select>
      </td>
      <td>

function addToReassort(i) {

  if (qtyEl && parseInt(qtyEl.value) === 0) {
    qtyEl.value = 1;
    updateSummary();

  qtyEl?.focus();

function updateSummary() {
  const rows = document.querySelectorAll('[id^="qty-"]');
  const items = [];
  rows.forEach((el, i) => {
    const qty = parseInt(el.value) || 0;
    if (qty > 0) {
      const ruleEl = document.getElementById(`rule-${i}`);
      items.push({
        ref: el.dataset.ref,
        style: el.dataset.style,
        size: el.dataset.size,
        qty,
        rule: ruleEl?.options[ruleEl.selectedIndex]?.text || '—'
      });
    }
  });
  const summaryEl = document.getElementById('reassortSummary');
  const summaryContent = document.getElementById('summaryContent');
  if (!summaryEl || !summaryContent) return;
  if (items.length === 0) {
    summaryEl.style.display = 'none';
    return;
  }
  summaryEl.style.display = 'block';
  const totalQty = items.reduce((s,r) => s+r.qty, 0);
  summaryContent.innerHTML = `
    <div style="margin-bottom:.75rem;font-size:12px;color:var(--text2)">
      <strong style="color:var(--text)">${items.length}</strong> référence(s) · <strong style="color:var(--text)">${totalQty}</strong> unité(s) au total
    </div>
    <table style="width:100%;font-size:12px;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Référence</th>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Article</th>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Taille</th>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Justification</th>
        <th style="text-align:right;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Qté</th>
      </tr></thead>
      <tbody>
        ${items.map(it=>`<tr>
          <td style="padding:6px 0;border-bottom:1px solid var(--border);font-family:monospace;font-size:11px">${it.ref}</td>
          <td style="padding:6px 0;border-bottom:1px solid var(--border);color:var(--text2)">${it.style}</td>

          <td style="padding:6px 0;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px">${it.rule}</td>

function clearReassort() {
  document.querySelectorAll('[id^="qty-"]').forEach(el => { el.value = 0; });

  updateSummary();
}


function exportReassortExcel() {
  const rows = document.querySelectorAll('[id^="qty-"]');
  const items = [];
  rows.forEach((el,i) => {
    const qty = parseInt(el.value)||0;
    if (qty > 0) {
      const ruleEl = document.getElementById(`rule-${i}`);
      items.push([el.dataset.ref, el.dataset.style, el.dataset.size, qty, ruleEl?.options[ruleEl.selectedIndex]?.text||'—']);
    }
  });
  if (!items.length) { alert('Aucune quantité saisie.'); return; }
  const sp = SPACES[currentSpace];
  const date = new Date().toLocaleDateString('fr-FR').replace(/\//g,'-');
  let csv = 'Référence,Article,Taille,Quantité,Justification\n';
  items.forEach(row => { csv += row.map(v=>`"${v}"`).join(',') + '\n'; });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `reassort_${sp.brand.replace(' ','-')}_${sp.store}_${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function createUser() {
  const name  = document.getElementById('newUserName')?.value?.trim();
  const email = document.getElementById('newUserEmail')?.value?.trim();
  const pass  = document.getElementById('newUserPass')?.value?.trim();
  const fb    = document.getElementById('createUserFeedback');

  if (!name || !email || !pass) {
    fb.innerHTML = `<div class="alert-banner" style="background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger)">Tous les champs sont obligatoires.</div>`;
    return;
  }
  if (USERS[email]) {
    fb.innerHTML = `<div class="alert-banner" style="background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger)">Cet email existe déjà.</div>`;
    return;
  }

  // Get selected spaces
  const spaces = Object.keys(SPACES).filter(id => document.getElementById('access-' + id)?.checked);
  if (spaces.length === 0) {
    fb.innerHTML = `<div class="alert-banner" style="background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger)">Sélectionnez au moins un espace.</div>`;
    return;
  }

  const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  
  // Create a new SPACE for each selected store with the brand name
  const brandId = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  const storeMap = {
    'les-deux-glh':       {store:'GLH',   storeLabel:'GL Haussmann'},
    'les-deux-glce':      {store:'GLCE',  storeLabel:'GL Champs-Élysées'},
    'les-deux-printemps': {store:'PRT',   storeLabel:'Printemps'},
    'les-deux-citadium':  {store:'CTD',   storeLabel:'Citadium'},
    'les-deux-bonmarche': {store:'BM',    storeLabel:'Bon Marché'},
    'les-deux-bhv':       {store:'BHV',   storeLabel:'BHV'},
  };
  const newSpaces = [];
  spaces.forEach(storeSpaceId => {
    const storeInfo = storeMap[storeSpaceId];
    if (!storeInfo) return;
    const newSpaceId = brandId + '-' + storeInfo.store.toLowerCase();
    SPACES[newSpaceId] = {
      id: newSpaceId,
      brand: name,
      store: storeInfo.store,
      storeLabel: storeInfo.storeLabel,
      color: '#6A7A8A',
      colorLight: '#EEF0F2',
      colorText: '#3A4A5A'
    };
    STOCKS[newSpaceId]  = [];
    SALES[newSpaceId]   = { week:'—', total:0, returns:0, ca:0, byDay:[{l:'Lu',v:0},{l:'Ma',v:0},{l:'Me',v:0},{l:'Je',v:0},{l:'Ve',v:0},{l:'Sa',v:0},{l:'Di',v:0}], topRefs:[], sellThrough:0 };
    HISTORY[newSpaceId] = [];
    MISSING[newSpaceId] = [];
    SEASONS[newSpaceId] = [];
    newSpaces.push(newSpaceId);
  });

  USERS[email] = {
    pass, role: 'brand',
    brand: newSpaces[0],
    spaces: newSpaces,
    name,
    initials
  };

  // Save to Supabase
  const spaceObjects = newSpaces.map(id => SPACES[id]);
  createUserInDB(email, pass, name, 'brand', initials, spaceObjects).then(ok => {
    console.log('User saved to DB:', ok);
  });

  fb.innerHTML = `<div class="alert-banner" style="background:var(--success-bg);color:var(--success);border:1px solid var(--success)">
    Compte créé ✓ — ${name} · ${newSpaces.length} espace(s) créé(s)<br>
    <span style="font-size:11px">Email : ${email} · Mot de passe : ${pass}</span>
  </div>`;

  // Clear fields
  ['newUserName','newUserEmail','newUserPass'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  ['les-deux-glh','les-deux-glce','les-deux-printemps','les-deux-citadium','les-deux-bonmarche','les-deux-bhv'].forEach(id => {
    const el=document.getElementById('access-'+id); if(el) el.checked=false;
  });

  // Refresh sidebar immediately
  renderSidebar();
  setTimeout(() => navigateTo('comptes'), 1200);
}

function deleteUser(email) {
  if (!confirm('Supprimer le compte ' + email + ' ?')) return;
  const user = USERS[email];
  if (user && user.spaces) {
    user.spaces.forEach(spaceId => {
      if (!['les-deux-glh','les-deux-glce'].includes(spaceId)) {
        delete SPACES[spaceId];
        delete STOCKS[spaceId];
        delete SALES[spaceId];
        delete HISTORY[spaceId];
        delete MISSING[spaceId];
        delete SEASONS[spaceId];
      }
    });
  }
  delete USERS[email];
  // Delete from Supabase
  deleteUserFromDB(email);
  if (!SPACES[currentSpace]) currentSpace = 'les-deux-glh';
  renderSidebar();
  navigateTo('comptes');
}


function buildDynamicBrandsHTML() {
  const fixedPrefixes = ['les-deux', 'nn07'];
  const dynamicSpaces = Object.entries(SPACES).filter(([id]) => !fixedPrefixes.some(p => id.startsWith(p)));

  const brands = {};
  dynamicSpaces.forEach(([id, sp]) => {
    if (!brands[sp.brand]) brands[sp.brand] = [];
    brands[sp.brand].push([id, sp]);
  });
  return Object.entries(brands).map(([brand, spaceList]) => {
    const pills = spaceList.map(([id, sp]) => {

        '<div style="width:8px;height:8px;border-radius:50%;background:' + sp.color + '"></div>' +
        sp.storeLabel +
        '</div>';
    }).join('');
    return '<div class="sidebar-section">' + brand + '</div>' + pills + '<div class="sidebar-divider"></div>';
  }).join('');

function updateComment(i, value) {
  const stocks = STOCKS[currentSpace]||[];
  if (!stocks[i]) return;
  stocks[i].comment = value;
  // Save to Supabase
  if (sb) {
    const r = stocks[i];
    sb.from('stock_items').update({ comment: value, updated_at: new Date() })
      .eq('space_id', currentSpace)
      .eq('ref', r.ref)
      .eq('size', r.size)
      .then(({error}) => {
        if (error) console.error('Comment save error:', error);
      });
  }
}


function toggleMissingRefs() {
  const list = document.getElementById('missingRefsList');
  const btn = document.getElementById('btnMissing');
  if (!list) return;
  const visible = list.style.display !== 'none';
  list.style.display = visible ? 'none' : 'block';
  if (btn) btn.textContent = visible ? 'Voir les références' : 'Masquer';
}

</script>
