<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Clothette Retail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #F2F2F2;
      --bg2:     #FFFFFF;
      --bg3:     #F7F7F7;
      --bg4:     #E8E8E8;
      --border:  #DDDDDД;
      --border2: #BBBBBB;
      --text:    #111111;
      --text2:   #444444;
      --text3:   #888888;
      --accent:  #1A1A1A;
      --accent-light: #EFEFEF;
      --accent-text:  #111111;
      --success:     #2E6B4A;
      --success-bg:  #EDF5F0;
      --warning:     #8A6420;
      --warning-bg:  #FBF5E8;
      --danger:      #A03030;
      --danger-bg:   #FAF0F0;
      --info:        #2A5A8A;
      --info-bg:     #EDF2FA;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans:  'DM Sans', sans-serif;
      --r: 6px; --rl: 8px;
    }
    html, body { height: 100%; font-family: var(--font-sans); color: var(--text); background: var(--bg); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
    .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 2.75rem; width: 100%; max-width: 360px; }
    .login-logo { font-family: var(--font-serif); font-size: 24px; font-weight: 300; margin-bottom: .2rem; letter-spacing: .06em; text-transform: uppercase; color: var(--text); }
    .login-logo em { color: var(--accent); font-style: italic; text-transform: none; font-weight: 400; }
    .login-sub { font-size: 10px; color: var(--text3); margin-bottom: 2rem; letter-spacing: .1em; text-transform: uppercase; }
    .login-divider { height: 1px; background: var(--border); margin-bottom: 1.75rem; }
    .login-field { margin-bottom: .85rem; }
    .login-field label { display: block; font-size: 10px; font-weight: 400; color: var(--text3); margin-bottom: .35rem; letter-spacing: .08em; text-transform: uppercase; }
    .login-field input { width: 100%; border: 1px solid var(--border); border-radius: var(--r); padding: 9px 12px; font-size: 13px; font-family: var(--font-sans); outline: none; transition: border-color .15s; background: var(--bg3); color: var(--text); }
    .login-field input:focus { border-color: var(--accent); background: var(--bg2); }
    .login-field input::placeholder { color: var(--text3); }
    .btn-login { width: 100%; background: var(--text); color: var(--bg2); border: none; border-radius: var(--r); padding: 11px; font-size: 12px; font-weight: 400; font-family: var(--font-sans); cursor: pointer; margin-top: .75rem; transition: opacity .15s; letter-spacing: .08em; text-transform: uppercase; }
    .btn-login:hover { opacity: .85; }
    .login-hint { display: flex; gap: 1.5rem; margin-top: 1.25rem; font-size: 11px; color: var(--text3); justify-content: center; }
    .login-hint span { cursor: pointer; transition: color .15s; }
    .login-hint span:hover { color: var(--accent); }

    /* TOPNAV */
    .topnav { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: var(--font-serif); font-size: 15px; font-weight: 300; letter-spacing: .1em; text-transform: uppercase; color: var(--text); }
    .nav-logo em { color: var(--accent); font-style: italic; text-transform: none; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-role { font-size: 10px; background: var(--accent-light); color: var(--accent-text); padding: 3px 10px; border-radius: 20px; font-weight: 400; letter-spacing: .06em; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: var(--accent-text); }
    .btn-logout { background: none; border: 1px solid var(--border); border-radius: var(--r); padding: 5px 12px; font-size: 11px; font-family: var(--font-sans); cursor: pointer; color: var(--text3); transition: all .15s; letter-spacing: .04em; }
    .btn-logout:hover { border-color: var(--border2); color: var(--text2); }

    /* LAYOUT */
    .app-layout { display: flex; min-height: calc(100vh - 50px); }
    .sidebar { width: 210px; border-right: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; padding: .75rem 0; overflow-y: auto; }
    .main-content { flex: 1; padding: 2rem; background: var(--bg); overflow-y: auto; }

    /* SIDEBAR */
    .sidebar-section { font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--text3); padding: 1rem 1.25rem .3rem; font-weight: 400; }
    .sidebar-item { display: flex; align-items: center; gap: 9px; padding: .5rem 1.25rem; font-size: 12px; cursor: pointer; color: var(--text3); border-left: 2px solid transparent; transition: all .12s; letter-spacing: .02em; }
    .sidebar-item:hover { color: var(--text2); background: var(--bg3); }
    .sidebar-item.active { color: var(--text); font-weight: 400; border-left-color: var(--accent); background: var(--bg3); }
    .brand-pill { display: flex; align-items: center; gap: 8px; padding: .4rem .75rem; font-size: 12px; cursor: pointer; border-radius: var(--r); margin: 2px .5rem; transition: all .12s; color: var(--text3); }
    .brand-pill:hover { background: var(--bg3); color: var(--text2); }
    .sidebar-divider { height: 1px; background: var(--border); margin: .5rem 1.25rem; }
    .store-badge { display: inline-flex; padding: 1px 7px; border-radius: 20px; font-size: 9px; font-weight: 400; margin-left: auto; letter-spacing: .04em; }

    /* PAGE */
    .page-title { font-family: var(--font-serif); font-size: 28px; font-weight: 300; margin-bottom: .15rem; color: var(--text); letter-spacing: .04em; }
    .page-sub { font-size: 11px; color: var(--text3); margin-bottom: 1.5rem; letter-spacing: .06em; text-transform: uppercase; }

    /* METRICS */
    .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
    .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); padding: .85rem 1rem; }
    .metric-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .4rem; }
    .metric-value { font-size: 26px; font-weight: 200; line-height: 1.1; font-family: var(--font-serif); letter-spacing: -.01em; }

    /* CARDS */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); padding: 1.1rem 1.25rem; margin-bottom: .85rem; }
    .card-title { font-size: 9px; font-weight: 400; margin-bottom: .85rem; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; }
    .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; margin-bottom: .85rem; }
    .grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: .85rem; }

    /* TABLE */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; margin-bottom: .85rem; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: var(--bg3); padding: 9px 16px; text-align: left; font-size: 9px; font-weight: 400; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); }
    td { padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); }

    /* BADGES */
    .badge { display: inline-flex; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 400; letter-spacing: .03em; }
    .badge-ok     { background: var(--success-bg); color: var(--success); }
    .badge-warn   { background: var(--warning-bg); color: var(--warning); }
    .badge-danger { background: var(--danger-bg);  color: var(--danger); }
    .badge-info   { background: var(--info-bg);    color: var(--info); }
    .badge-accent { background: var(--accent-light); color: var(--accent-text); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; padding: 7px 16px; border-radius: var(--r); font-size: 11px; font-weight: 400; font-family: var(--font-sans); cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); transition: all .15s; letter-spacing: .04em; }
    .btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
    .btn-sm { padding: 3px 10px; font-size: 11px; border-radius: 4px; }
    .btn-primary { background: var(--text); color: var(--bg2); border-color: var(--text); }
    .btn-primary:hover { opacity: .85; }

    /* FORMS */
    .search-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-input { border: 1px solid var(--border); border-radius: var(--r); padding: 7px 12px; font-size: 12px; font-family: var(--font-sans); background: var(--bg2); color: var(--text); outline: none; min-width: 180px; flex: 1; transition: border-color .15s; }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--accent); }
    .filter-select { border: 1px solid var(--border); border-radius: var(--r); padding: 7px 12px; font-size: 12px; font-family: var(--font-sans); background: var(--bg2); color: var(--text); outline: none; cursor: pointer; }

    /* DROP ZONES */
    .drop-zone { border: 1px dashed var(--border2); border-radius: var(--rl); padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all .15s; background: var(--bg3); }
    .drop-zone:hover { background: var(--accent-light); border-color: var(--accent); }
    .drop-zone-sm { border: 1px dashed var(--border); border-radius: var(--r); padding: 1.25rem; text-align: center; cursor: pointer; background: var(--bg3); transition: all .15s; }
    .drop-zone-sm:hover { background: var(--accent-light); border-color: var(--accent); }

    /* MISC */
    .section-label { font-size: 9px; font-weight: 400; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); margin-bottom: .6rem; margin-top: 1.25rem; }
    .alert-banner { border-radius: var(--r); padding: .75rem 1rem; font-size: 12px; margin-bottom: 1rem; }
    .bar-track { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; }
    .file-row { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.25rem; border-bottom: 1px solid var(--border); }
    .file-row:last-child { border-bottom: none; }
    .file-icon { width: 34px; height: 34px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; letter-spacing: .04em; }
    .collection-card { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.25rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); margin-bottom: 6px; }
    .mono { font-family: 'Courier New', monospace; font-size: 11px; color: var(--text2); }
    @media (max-width: 640px) { .sidebar { display: none; } .main-content { padding: 1rem; } }
  </style>
</head>

</div>

async function loadCatalogueFromDB(brandId, limit=5000) {
  if (!sb) return null;
  const {data,error} = await sb.from('catalogue').select('*').eq('brand_id',brandId).limit(limit);
  if (error) { console.error(error); return null; }
  return data;
}
async function loadStocksFromDB(brandId, storeId) {
  if (!sb) return null;
  const {data,error} = await sb.from('stocks').select('*, catalogue(style_name,category,size,ean)').eq('brand_id',brandId).eq('store_id',storeId);
  if (error) { console.error(error); return null; }
  return data;
}
async function loadHistoryFromDB(brandId) {
  if (!sb) return null;
  const {data,error} = await sb.from('import_history').select('*').eq('brand_id',brandId).order('created_at',{ascending:false}).limit(20);
  if (error) { console.error(error); return null; }
  return data;
}
async function logImportToDB(brandId, fileName, type, total, ok, failed, status) {
  if (!sb) return;
  await sb.from('import_history').insert({brand_id:brandId,file_name:fileName,import_type:type,lines_total:total,lines_ok:ok,lines_failed:failed,status});
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUser=null, currentSpace='les-deux-glh', currentPage=null;

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function setDemo(role) {
  document.getElementById('loginEmail').value = role==='admin' ? 'admin@clothette.com' : 'lesdeux@clothette.com';
  document.getElementById('loginPass').value  = role==='admin' ? 'admin123' : 'lesdeux123';
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value.trim();
  const user  = USERS[email];
  if (!user)            { alert('Email introuvable. Utilisez admin@clothette.com'); return; }
  if (user.pass!==pass) { alert('Mot de passe incorrect. Utilisez admin123');       return; }
  currentUser  = { email, ...user };
  currentSpace = user.role==='brand' ? user.brand : 'les-deux-glh';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('navRole').textContent   = user.role==='admin' ? 'Administrateur' : 'Marque';
  document.getElementById('navAvatar').textContent = user.initials;
  document.getElementById('navCenter').textContent = user.role==='brand' ? user.name : '';
  renderSidebar();
  navigateTo('overview');
}

function doLogout() {
  currentUser=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
}

function switchSpace(id){ currentSpace=id; renderSidebar(); navigateTo('overview'); }

// ─── ROUTER ───────────────────────────────────────────────────────────────────
function navigateTo(page) {
  currentPage=page; renderSidebar();
  const m=document.getElementById('mainContent');
  if(page==='global')            { m.innerHTML=pageGlobal(); setTimeout(initGlobalChart,0); }
  else if(page==='brand-global') m.innerHTML=pageBrandGlobal();
  else if(page==='overview')     { m.innerHTML=pageOverview(); setTimeout(initSalesChart,0); }
  else if(page==='stocks')    m.innerHTML=pageStocks();
  else if(page==='depot')        { m.innerHTML=pageDepot(); setTimeout(bindDepot,0); }
  else if(page==='catalogue')    { m.innerHTML='<div style="padding:2rem;color:var(--text3)">Chargement...</div>'; pageCatalogueAsync().then(()=>{}); }
  else if(page==='historique')   { m.innerHTML='<div style="padding:2rem;color:var(--text3)">Chargement...</div>'; pageHistoriqueAsync().then(()=>{}); }
  else if(page==='reassort')     { m.innerHTML=pageReassort(); setTimeout(bindReassort,0); }
}

// ─── BRAND GLOBAL VIEW ───────────────────────────────────────────────────────
function pageBrandGlobal() {
  const user = currentUser;
  const spaces = user.spaces.map(id => SPACES[id]);
  const sp0 = spaces[0];
  const totalVentes = spaces.reduce((s,sp)=>s+(SALES[sp.id]?.total||0),0);
  const totalCA = spaces.reduce((s,sp)=>s+(SALES[sp.id]?.ca||0),0);
  const totalRetours = spaces.reduce((s,sp)=>s+(SALES[sp.id]?.returns||0),0);
  const allStocks = {};
  spaces.forEach(sp => {
    (STOCKS[sp.id]||[]).forEach(r => {
      const key = r.ref+'-'+r.size;
      if (!allStocks[key]) allStocks[key] = { ref:r.ref, style:r.style, size:r.size, cat:r.cat, min:r.min, stores:{} };
      allStocks[key].stores[sp.store] = r.qty;
    });
  });
  const consolidated = Object.values(allStocks);
  const ruptures = consolidated.filter(r=>Object.values(r.stores).every(q=>q===0)).length;
  const critiques = consolidated.filter(r=>{const t=Object.values(r.stores).reduce((s,q)=>s+q,0);return t>0&&t<r.min;}).length;
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:.25rem">
    <div class="page-title">${sp0.brand}</div>
    <span class="badge" style="background:${sp0.colorLight};color:${sp0.colorText}">Vue consolidée</span>
  </div>
  <div class="page-sub">Tous mes points de vente · semaine en cours</div>
  <div class="metric-row">
    <div class="metric"><div class="metric-label">Total ventes</div><div class="metric-value" style="color:var(--success)">${totalVentes}</div></div>
    <div class="metric"><div class="metric-label">CA TTC total</div><div class="metric-value" style="color:var(--info)">${totalCA.toLocaleString('fr-FR')} €</div></div>
    <div class="metric"><div class="metric-label">Retours</div><div class="metric-value" style="color:var(--danger)">${totalRetours}</div></div>
    <div class="metric"><div class="metric-label">Ruptures</div><div class="metric-value" style="color:var(--danger)">${ruptures}</div></div>
    <div class="metric"><div class="metric-label">Critiques</div><div class="metric-value" style="color:var(--warning)">${critiques}</div></div>
  </div>
  <div class="grid2">
    ${spaces.map(sp=>{
      const s=SALES[sp.id]||{};
      const stocks=STOCKS[sp.id]||[];
      const rups=stocks.filter(r=>r.qty===0).length;
      return `<div class="card" style="cursor:pointer;border-left:3px solid ${sp.color}" onclick="switchSpace('${sp.id}')">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem">
          <div style="font-size:13px;font-weight:500">${sp.storeLabel}</div>
          <span class="badge" style="background:${sp.colorLight};color:${sp.colorText};margin-left:auto">${sp.store}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

          <div><div style="font-size:11px;color:var(--text2)">CA TTC</div><div style="font-size:14px;font-weight:500;color:var(--info)">${(s.ca||0).toLocaleString('fr-FR')} €</div></div>

function renderStocksRows(data){
  if(!data.length) return `<tr><td colspan="7" style="text-align:center;color:var(--text2);padding:2rem">Aucun résultat</td></tr>`;
  return data.map(r=>{
    const st=r.qty===0?'danger':r.qty<r.min?'warn':'ok';
    return `<tr>
      <td class="mono">${r.ref}</td><td style="color:var(--text2)">${r.style}</td>
      <td>${r.size}</td><td><span class="badge badge-accent" style="font-size:10px">${r.cat}</span></td>
      <td style="font-weight:500;color:${r.qty===0?'var(--danger)':r.qty<r.min?'var(--warning)':'var(--text)'}">${r.qty}</td>
      <td style="color:var(--text2)">${r.min}</td>
      <td><span class="badge badge-${st}">${st==='ok'?'En stock':st==='warn'?'Critique':'Rupture'}</span></td>
    </tr>`;
  }).join('');
}

function filterS(){
  const search=document.getElementById('sSearch')?.value.toLowerCase()||'';
  const cat=document.getElementById('sCat')?.value||'';
  const status=document.getElementById('sStatus')?.value||'';
  let data=STOCKS[currentSpace]||[];
  if(search) data=data.filter(r=>r.ref.toLowerCase().includes(search)||r.style.toLowerCase().includes(search));
  if(cat) data=data.filter(r=>r.cat===cat);
  if(status) data=data.filter(r=>(r.qty===0?'danger':r.qty<r.min?'warn':'ok')===status);
  const tb=document.getElementById('stocksTbody');
  if(tb) tb.innerHTML=renderStocksRows(data);
}

// ─── DEMANDE RÉASSORT ─────────────────────────────────────────────────────────
function pageReassort() {
  const sp = SPACES[currentSpace];
  const stocks = STOCKS[currentSpace] || [];
  const rules = [
    {id:1, label:'Best-seller'},
    {id:2, label:'Opportunité commerciale'},
    {id:3, label:'Produit complémentaire'},
    {id:4, label:'Rupture produit essentiel'},
    {id:5, label:'Commande client spécifique'},
    {id:6, label:'Nouveau produit/couleur'},
    {id:7, label:'NOOS — complément de taille'},
  ];
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:.25rem">
    <div class="page-title">Demande de réassort</div>
    <span class="badge badge-accent">${sp.brand} · ${sp.storeLabel}</span>
  </div>
  <div class="page-sub">Sélectionnez les produits à réassortir et indiquez les quantités souhaitées</div>

  <div class="card" style="margin-bottom:1rem">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem">Point de vente</div>
        <select class="filter-select" id="rStore" style="width:100%" onchange="renderReassortTable()">
          <option value="${sp.store}">${sp.storeLabel}</option>
          ${sp.store === 'GLH' && currentUser.spaces && currentUser.spaces.length > 1 ?
            '<option value="GLCE">GL Champs-Élysées</option><option value="ALL">Les deux magasins</option>' : ''}
        </select>
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem">Rechercher</div>
        <input class="search-input" id="rSearch" placeholder="Référence ou article..." oninput="renderReassortTable()" style="width:100%">
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem">Filtrer</div>
        <select class="filter-select" id="rFilter" style="width:100%" onchange="renderReassortTable()">
          <option value="all">Tous les produits</option>
          <option value="low">Stock faible (priorité)</option>
          <option value="zero">Ruptures uniquement</option>
        </select>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th style="width:18%">Référence</th>
        <th style="width:22%">Article</th>
        <th style="width:7%">Taille</th>
        <th style="width:8%">Stock</th>
        <th style="width:8%">Statut</th>
        <th style="width:22%">Justification</th>
        <th style="width:10%">Quantité</th>
        <th style="width:5%"></th>
      </tr></thead>
      <tbody id="reassortTbody">${renderReassortRows(stocks, rules)}</tbody>
    </table>
  </div>

  <div id="reassortSummary" style="display:none" class="card" style="border-left:3px solid var(--accent)">
    <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem">Récapitulatif de la demande</div>
    <div id="summaryContent"></div>
    <div style="display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="exportReassortExcel()">Exporter en Excel</button>
      <button class="btn" onclick="clearReassort()">Réinitialiser</button>
    </div>
  </div>`;
}

function renderReassortRows(stocks, rules) {
  if (!rules) {
    rules = [
      {id:1,label:'Best-seller'},{id:2,label:'Opportunité commerciale'},
      {id:3,label:'Produit complémentaire'},{id:4,label:'Rupture essentiel'},
      {id:5,label:'Commande client'},{id:6,label:'Nouveau produit/couleur'},
      {id:7,label:'NOOS'},
    ];
  }
  const search = document.getElementById('rSearch')?.value?.toLowerCase() || '';
  const filter = document.getElementById('rFilter')?.value || 'all';
  let data = stocks;
  if (search) data = data.filter(r => r.ref.toLowerCase().includes(search) || r.style.toLowerCase().includes(search));
  if (filter === 'low')  data = data.filter(r => r.qty < r.min);
  if (filter === 'zero') data = data.filter(r => r.qty === 0);
  if (!data.length) return `<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:2rem">Aucun produit trouvé</td></tr>`;
  return data.map((r,i) => {
    const st = r.qty===0?'danger':r.qty<r.min?'warn':'ok';
    const stLabel = st==='ok'?'En stock':st==='warn'?'Critique':'Rupture';
    return `<tr id="rrow-${i}">
      <td class="mono">${r.ref}</td>
      <td style="color:var(--text2)">${r.style}</td>
      <td>${r.size}</td>
      <td style="font-weight:500;color:${r.qty===0?'var(--danger)':r.qty<r.min?'var(--warning)':'var(--text)'}">${r.qty}</td>
      <td><span class="badge badge-${st}">${stLabel}</span></td>
      <td>
        <select style="border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:11px;font-family:var(--font-sans);background:var(--bg2);color:var(--text);outline:none;width:100%" id="rule-${i}" onchange="updateSummary()">
          <option value="">— Choisir —</option>
          ${rules.map(rule=>`<option value="${rule.id}">${rule.id}. ${rule.label}</option>`).join('')}
        </select>
      </td>
      <td>
        <input type="number" min="0" max="99" value="0" id="qty-${i}"
          style="border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:13px;font-family:var(--font-sans);background:var(--bg2);color:var(--text);outline:none;width:64px;text-align:center"
          data-ref="${r.ref}" data-style="${r.style}" data-size="${r.size}"
          oninput="updateSummary()">
      </td>
      <td>
        <button class="btn btn-sm" onclick="addToReassort(${i})" style="font-size:10px;padding:3px 8px">+</button>
      </td>
    </tr>`;
  }).join('');
}

function renderReassortTable() {
  const stocks = STOCKS[currentSpace] || [];
  const tbody = document.getElementById('reassortTbody');
  if (tbody) tbody.innerHTML = renderReassortRows(stocks, null);
  updateSummary();
}

function addToReassort(i) {
  const qtyEl = document.getElementById(`qty-${i}`);
  if (qtyEl && parseInt(qtyEl.value) === 0) {
    qtyEl.value = 1;
    updateSummary();
  }
  qtyEl?.focus();
}

function updateSummary() {
  const rows = document.querySelectorAll('[id^="qty-"]');
  const items = [];
  rows.forEach((el, i) => {
    const qty = parseInt(el.value) || 0;
    if (qty > 0) {
      const ruleEl = document.getElementById(`rule-${i}`);
      items.push({
        ref: el.dataset.ref,
        style: el.dataset.style,
        size: el.dataset.size,
        qty,
        rule: ruleEl?.options[ruleEl.selectedIndex]?.text || '—'
      });
    }
  });
  const summaryEl = document.getElementById('reassortSummary');
  const summaryContent = document.getElementById('summaryContent');
  if (!summaryEl || !summaryContent) return;
  if (items.length === 0) {
    summaryEl.style.display = 'none';
    return;
  }
  summaryEl.style.display = 'block';
  const totalQty = items.reduce((s,r) => s+r.qty, 0);
  summaryContent.innerHTML = `
    <div style="margin-bottom:.75rem;font-size:12px;color:var(--text2)">
      <strong style="color:var(--text)">${items.length}</strong> référence(s) · <strong style="color:var(--text)">${totalQty}</strong> unité(s) au total
    </div>
    <table style="width:100%;font-size:12px;border-collapse:collapse">
      <thead><tr>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Référence</th>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Article</th>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Taille</th>
        <th style="text-align:left;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Justification</th>
        <th style="text-align:right;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Qté</th>
      </tr></thead>
      <tbody>
        ${items.map(it=>`<tr>
          <td style="padding:6px 0;border-bottom:1px solid var(--border);font-family:monospace;font-size:11px">${it.ref}</td>
          <td style="padding:6px 0;border-bottom:1px solid var(--border);color:var(--text2)">${it.style}</td>
          <td style="padding:6px 0;border-bottom:1px solid var(--border)">${it.size}</td>
          <td style="padding:6px 0;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px">${it.rule}</td>
          <td style="padding:6px 0;border-bottom:1px solid var(--border);text-align:right;font-weight:500">${it.qty}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function clearReassort() {
  document.querySelectorAll('[id^="qty-"]').forEach(el => { el.value = 0; });
  document.querySelectorAll('[id^="rule-"]').forEach(el => { el.value = ''; });
  updateSummary();
}


function exportReassortExcel() {
  const rows = document.querySelectorAll('[id^="qty-"]');
  const items = [];
  rows.forEach((el,i) => {
    const qty = parseInt(el.value)||0;
    if (qty > 0) {
      const ruleEl = document.getElementById(`rule-${i}`);
      items.push([el.dataset.ref, el.dataset.style, el.dataset.size, qty, ruleEl?.options[ruleEl.selectedIndex]?.text||'—']);
    }
  });
  if (!items.length) { alert('Aucune quantité saisie.'); return; }
  const sp = SPACES[currentSpace];
  const date = new Date().toLocaleDateString('fr-FR').replace(/\//g,'-');
  let csv = 'Référence,Article,Taille,Quantité,Justification\n';
  items.forEach(row => { csv += row.map(v=>`"${v}"`).join(',') + '\n'; });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `reassort_${sp.brand.replace(' ','-')}_${sp.store}_${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function bindReassort() {
  renderReassortTable();
}

// ─── CHART INIT ───────────────────────────────────────────────────────────────
let salesChartInstance = null;
function initSalesChart() {
  const canvas = document.getElementById('salesChart');
  if (!canvas || typeof Chart === 'undefined') return;
  const s = SALES[currentSpace];
  const sp = SPACES[currentSpace];
  const labels = s.byDay.map(d => d.l);
  const data = s.byDay.map(d => d.v);
  const maxV = Math.max(...data, 1);
  if (salesChartInstance) { salesChartInstance.destroy(); }
  salesChartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map((v,i) => {
          const day = labels[i];
          if (day === 'Sa' || day === 'Di') return sp.color;
          return sp.color + '55';
        }),
        borderColor: 'transparent',
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw} vente${ctx.raw > 1 ? 's' : ''}`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { font: { size: 11, family: 'DM Sans' }, color: '#888888' }
        },
        y: {
          grid: { color: '#F0F0F0', drawBorder: false },
          border: { display: false, dash: [4,4] },
          ticks: { font: { size: 11, family: 'DM Sans' }, color: '#888888', stepSize: Math.ceil(maxV/5) },
          min: 0,
        }
      }
    }
  });
}


function initGlobalChart() {
  const canvas = document.getElementById('globalChart');
  if (!canvas || typeof Chart === 'undefined') return;
  const spaces = Object.values(SPACES);
  const labels = ['Lu','Ma','Me','Je','Ve','Sa','Di'];
  const datasets = spaces.map(sp => ({
    label: sp.brand + ' ' + sp.store,
    data: (SALES[sp.id]?.byDay || labels.map(()=>0)).map(d => d.v || 0),
    backgroundColor: sp.color + '88',
    borderColor: sp.color,
    borderWidth: 2,
    borderRadius: 4,
    borderSkipped: false,
  }));
  if (window._globalChart) window._globalChart.destroy();
  window._globalChart = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size:11, family:'DM Sans' }, color:'#888', padding:16, boxWidth:12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw} ventes` } }
      },
      scales: {
        x: { grid: { display:false }, border: { display:false }, ticks: { font:{size:11,family:'DM Sans'}, color:'#888' } },
        y: { grid: { color:'#F0F0F0' }, border: { display:false, dash:[4,4] }, ticks: { font:{size:11,family:'DM Sans'}, color:'#888' }, min:0 }
      }
    }
  });
}
