<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Clothette Retail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1A1714; --cream: #F9F6F1; --muted: #7A7570; --border: #E8E3DB; --white: #FFFFFF;
      --accent: #534AB7; --accent-light: #EEEDFE; --accent-text: #3C3489;
      --success: #3B6D11; --success-bg: #EAF3DE; --success-border: #97C459;
      --warning: #854F0B; --warning-bg: #FAEEDA; --warning-border: #EF9F27;
      --danger: #A32D2D; --danger-bg: #FCEBEB; --danger-border: #E24B4A;
      --info: #0C447C; --info-bg: #E6F1FB; --info-border: #378ADD;
      --green: #1D9E75; --green-light: #E1F5EE; --green-text: #085041;
      --font-serif: 'Cormorant Garamond', serif; --font-sans: 'DM Sans', sans-serif;
      --r: 8px; --rl: 12px;
    }
    html, body { height: 100%; font-family: var(--font-sans); color: var(--ink); background: var(--cream); font-size: 14px; line-height: 1.6; }
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
    .login-logo { font-family: var(--font-serif); font-size: 26px; font-weight: 500; margin-bottom: .25rem; }
    .login-logo span { color: var(--accent); font-style: italic; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
    .login-field { margin-bottom: 1rem; }
    .login-field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .06em; }
    .login-field input { width: 100%; border: 0.5px solid var(--border); border-radius: var(--r); padding: 10px 12px; font-size: 13px; font-family: var(--font-sans); outline: none; transition: border-color .15s; }
    .login-field input:focus { border-color: var(--accent); }
    .btn-login { width: 100%; background: var(--ink); color: var(--white); border: none; border-radius: var(--r); padding: 11px; font-size: 14px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; margin-top: .5rem; transition: opacity .15s; }
    .btn-login:hover { opacity: .85; }
    .login-hint { display: flex; gap: 1rem; margin-top: 1.25rem; font-size: 12px; color: var(--accent); justify-content: center; }
    .login-hint span { cursor: pointer; text-decoration: underline; }
    .topnav { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.5rem; border-bottom: 0.5px solid var(--border); background: var(--white); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: var(--font-serif); font-size: 18px; font-weight: 500; }
    .nav-logo span { color: var(--accent); font-style: italic; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-role { font-size: 11px; background: var(--accent-light); color: var(--accent-text); padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--accent-text); }
    .btn-logout { background: none; border: 0.5px solid var(--border); border-radius: var(--r); padding: 5px 12px; font-size: 12px; font-family: var(--font-sans); cursor: pointer; color: var(--muted); }
    .btn-logout:hover { background: var(--cream); }
    .app-layout { display: flex; min-height: calc(100vh - 49px); }
    .sidebar { width: 220px; border-right: 0.5px solid var(--border); background: var(--white); flex-shrink: 0; padding: .75rem 0; overflow-y: auto; }
    .main-content { flex: 1; padding: 1.5rem; background: var(--cream); overflow-y: auto; }
    .sidebar-section { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: .85rem 1.25rem .3rem; font-weight: 500; }
    .sidebar-item { display: flex; align-items: center; gap: 9px; padding: .55rem 1.25rem; font-size: 13px; cursor: pointer; color: var(--muted); border-left: 2px solid transparent; transition: all .12s; }
    .sidebar-item:hover { color: var(--ink); background: var(--cream); }
    .sidebar-item.active { color: var(--ink); font-weight: 500; border-left-color: var(--accent); background: var(--cream); }
    .sidebar-item.active.green-active { border-left-color: var(--green); }
    .brand-pill { display: flex; align-items: center; gap: 8px; padding: .45rem .75rem; font-size: 12px; cursor: pointer; border-radius: var(--r); margin: 2px .5rem; transition: background .12s; color: var(--muted); }
    .brand-pill:hover { background: var(--cream); color: var(--ink); }
    .brand-pill.active { font-weight: 500; }
    .sidebar-divider { height: 0.5px; background: var(--border); margin: .5rem 1.25rem; }
    .store-badge { display: inline-flex; padding: 1px 7px; border-radius: 20px; font-size: 10px; font-weight: 500; margin-left: auto; }
    .page-title { font-size: 20px; font-weight: 500; margin-bottom: .2rem; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.25rem; }
    .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .metric { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--r); padding: .85rem 1rem; }
    .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .3rem; }
    .metric-value { font-size: 22px; font-weight: 500; line-height: 1.1; }
    .card { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: .85rem; }
    .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-bottom: 1rem; }
    .grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 1rem; }
    .table-wrap { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--rl); overflow: hidden; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--cream); padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); border-bottom: 0.5px solid var(--border); }
    td { padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdfcfa; }
    .badge { display: inline-flex; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-ok { background: var(--success-bg); color: var(--success); }
    .badge-warn { background: var(--warning-bg); color: var(--warning); }
    .badge-danger { background: var(--danger-bg); color: var(--danger); }
    .badge-info { background: var(--info-bg); color: var(--info); }
    .badge-accent { background: var(--accent-light); color: var(--accent-text); }
    .badge-green { background: var(--green-light); color: var(--green-text); }
    .btn { display: inline-flex; align-items: center; padding: 8px 18px; border-radius: var(--r); font-size: 13px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; border: 0.5px solid var(--border); background: transparent; color: var(--ink); transition: all .15s; }
    .btn:hover { background: var(--cream); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-input { border: 0.5px solid var(--border); border-radius: var(--r); padding: 7px 12px; font-size: 13px; font-family: var(--font-sans); background: var(--white); color: var(--ink); outline: none; min-width: 180px; flex: 1; }
    .search-input:focus { border-color: var(--accent); }
    .filter-select { border: 0.5px solid var(--border); border-radius: var(--r); padding: 7px 12px; font-size: 13px; font-family: var(--font-sans); background: var(--white); color: var(--ink); outline: none; cursor: pointer; }
    .drop-zone { border: 1.5px dashed var(--border); border-radius: var(--rl); padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all .15s; background: var(--cream); }
    .drop-zone:hover { background: var(--info-bg); border-color: var(--accent); }
    .drop-zone-sm { border: 1px dashed var(--border); border-radius: var(--r); padding: 1.25rem; text-align: center; cursor: pointer; background: var(--cream); transition: all .15s; }
    .drop-zone-sm:hover { background: var(--white); border-color: var(--accent); }
    .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: .6rem; margin-top: 1.25rem; }
    .alert-banner { border-radius: var(--r); padding: .75rem 1rem; font-size: 13px; margin-bottom: 1rem; }
    .bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .file-row { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.25rem; border-bottom: 0.5px solid var(--border); }
    .file-row:last-child { border-bottom: none; }
    .file-icon { width: 34px; height: 34px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
    .collection-card { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.25rem; background: var(--white); border: 0.5px solid var(--border); border-radius: var(--rl); margin-bottom: 8px; }
    .mono { font-family: 'Courier New', monospace; font-size: 12px; }
    .global-header { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--rl); padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
    .store-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  </style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUser=null, currentSpace='les-deux-glh', currentPage=null;

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function setDemo(role) {
  document.getElementById('loginEmail').value = role==='admin' ? 'admin@clothette.com' : 'lesdeux@clothette.com';
  document.getElementById('loginPass').value  = role==='admin' ? 'admin123' : 'lesdeux123';
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value.trim();
  const user  = USERS[email];
  if (!user)            { alert('Email introuvable. Utilisez admin@clothette.com'); return; }
  if (user.pass!==pass) { alert('Mot de passe incorrect. Utilisez admin123');       return; }
  currentUser  = { email, ...user };
  currentSpace = user.role==='brand' ? user.brand : 'les-deux-glh';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('navRole').textContent   = user.role==='admin' ? 'Administrateur' : 'Marque';
  document.getElementById('navAvatar').textContent = user.initials;
  document.getElementById('navCenter').textContent = user.role==='brand' ? user.name : '';
  renderSidebar();
  navigateTo('overview');
}

function doLogout() {
  currentUser=null;

      <span class="store-badge" style="background:var(--green-light);color:var(--green-text)">GLH</span>
    </div>
    <div class="sidebar-divider"></div>`;
  }

  if (isBrand && currentUser.spaces && currentUser.spaces.length > 1) {
    html+=`<div class="sidebar-section">Vue globale</div>
    <div class="sidebar-item ${currentPage==='brand-global'?'active':''}" onclick="navigateTo('brand-global')">
      <span style="font-size:12px">⊕</span> Mes deux points de vente
    </div>
    <div class="sidebar-section">Mes points de vente</div>`;
    currentUser.spaces.forEach(spaceId => {
      const s = SPACES[spaceId];
      const isActive = currentSpace === spaceId && currentPage !== 'brand-global';
      html+=`<div class="brand-pill ${isActive?'active':''}" style="${isActive?`background:${s.colorLight};color:${s.colorText}`:''}" onclick="switchSpace('${spaceId}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${s.color}"></div>
        ${s.storeLabel}
        <span class="store-badge" style="background:${s.colorLight};color:${s.colorText}">${s.store}</span>
      </div>`;
    });
    html+=`<div class="sidebar-divider"></div>`;
  }

  html+=`<div class="sidebar-section">Navigation — ${sp.storeLabel}</div>`;
  pages.forEach(p=>{
    const isActive = currentPage===p.id;
    html+=`<div class="sidebar-item ${isActive?'active':''}" onclick="navigateTo('${p.id}')">${p.label}</div>`;
  });
  document.getElementById('sidebar').innerHTML=html;
}

function switchSpace(id){ currentSpace=id; renderSidebar(); navigateTo('overview'); }

// ─── ROUTER ───────────────────────────────────────────────────────────────────
function navigateTo(page) {
  currentPage=page; renderSidebar();
  const m=document.getElementById('mainContent');
  if(page==='global')            m.innerHTML=pageGlobal();
  else if(page==='brand-global') m.innerHTML=pageBrandGlobal();
  else if(page==='overview')     m.innerHTML=pageOverview();
  else if(page==='stocks')       m.innerHTML=pageStocks();
  else if(page==='depot')        { m.innerHTML=pageDepot(); setTimeout(bindDepot,0); }
  else if(page==='catalogue')    { m.innerHTML=pageCatalogue(); setTimeout(bindCatalogue,0); }
  else if(page==='historique')   m.innerHTML=pageHistorique();
}

function renderStocksRows(data){
  if(!data.length) return `<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:2rem">Aucun résultat</td></tr>`;
  return data.map(r=>{
    const st=r.qty===0?'danger':r.qty<r.min?'warn':'ok';
    return `<tr>
      <td class="mono">${r.ref}</td><td style="color:var(--muted)">${r.style}</td>
      <td>${r.size}</td><td><span class="badge badge-accent" style="font-size:10px">${r.cat}</span></td>
      <td style="font-weight:500;color:${r.qty===0?'var(--danger)':r.qty<r.min?'var(--warning)':'var(--ink)'}">${r.qty}</td>
      <td style="color:var(--muted)">${r.min}</td>
      <td><span class="badge badge-${st}">${st==='ok'?'En stock':st==='warn'?'Critique':'Rupture'}</span></td>
    </tr>`;
  }).join('');
}

function filterS(){
  const search=document.getElementById('sSearch')?.value.toLowerCase()||'';
  const cat=document.getElementById('sCat')?.value||'';
  const status=document.getElementById('sStatus')?.value||'';
  let data=STOCKS[currentSpace]||[];
  if(search) data=data.filter(r=>r.ref.toLowerCase().includes(search)||r.style.toLowerCase().includes(search));
  if(cat) data=data.filter(r=>r.cat===cat);
  if(status) data=data.filter(r=>(r.qty===0?'danger':r.qty<r.min?'warn':'ok')===status);
  const tb=document.getElementById('stocksTbody');
  if(tb) tb.innerHTML=renderStocksRows(data);
}

  document.getElementById('depotFeedback').innerHTML=`
    <div class="alert-banner" style="background:var(--success-bg);border:0.5px solid var(--success-border);color:var(--success);margin-top:.5rem">
      <strong>Fichier reçu : ${file.name}</strong><br>
      <span style="font-size:12px">Traitement en cours — stocks mis à jour automatiquement.</span>
    </div>`;
}

// ─── CATALOGUE ────────────────────────────────────────────────────────────────
function pageCatalogue(){
  const sp=SPACES[currentSpace], missing=MISSING[currentSpace]||[];
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:.25rem">
    <div class="page-title">Catalogue produits</div>
    <span class="badge" style="background:${sp.colorLight};color:${sp.colorText}">${sp.brand}</span>
  </div>
  <div class="page-sub">3 895 références · mis à jour le 16 janv. 2026</div>
  <div class="section-label" style="margin-top:0">Collections actives</div>
  <div class="collection-card" style="border-left:3px solid ${sp.color}">
    <div><div style="font-size:13px;font-weight:500">AW25 — Automne Hiver 2025</div>
    <div style="font-size:12px;color:var(--muted)">2 847 références</div></div>
    <span class="badge badge-ok">actif</span>
  </div>
  <div class="collection-card">
    <div><div style="font-size:13px;font-weight:500">SS26 — Printemps Été 2026</div>
    <div style="font-size:12px;color:var(--muted)">1 048 références</div></div>
    <span class="badge badge-info">nouveau</span>
  </div>
  <div class="section-label">Ajouter une collection</div>
  <div class="drop-zone" onclick="document.getElementById('inCat').click()">
    <div style="font-size:22px;opacity:.35;margin-bottom:8px">↑</div>
    <div style="font-size:14px;font-weight:500;margin-bottom:.3rem">Glissez le catalogue de la nouvelle collection</div>
    <div style="font-size:12px;color:var(--muted)">.xlsx · Season, Style no., Style, Color, Color Code, Size, Category, EAN</div>
    <input type="file" id="inCat" accept=".xlsx,.xls" style="display:none">
  </div>
  <div id="catFeedback"></div>
  ${missing.length?`
  <div class="section-label">Références introuvables (${missing.length})</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Référence</th><th>Article</th><th>Couleur / Taille</th><th>Qté</th><th></th></tr></thead>
    <tbody>${missing.map((r,i)=>`<tr>
      <td class="mono">${r.ref}</td><td style="color:var(--muted)">${r.style}</td>
      <td style="color:var(--muted);font-size:12px">${r.colorSize}</td>
      <td style="font-weight:500">${r.qty}</td>
      <td><button class="btn btn-sm" onclick="resolveRef(${i})">Résoudre</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`:`
  <div class="alert-banner" style="background:var(--success-bg);border:0.5px solid var(--success-border);color:var(--success);margin-top:1rem">Toutes les références sont à jour ✓</div>`}`;
}

function bindCatalogue(){
  const ic=document.getElementById('inCat');
  if(ic) ic.addEventListener('change',e=>{
    if(!e.target.files[0]) return;
    document.getElementById('catFeedback').innerHTML=`
      <div class="alert-banner" style="background:var(--success-bg);border:0.5px solid var(--success-border);color:var(--success);margin-top:.75rem">
        <strong>Catalogue reçu : ${e.target.files[0].name}</strong>
      </div>`;
  });
}

function resolveRef(i){ MISSING[currentSpace].splice(i,1); navigateTo('catalogue'); }

// ─── HISTORIQUE ───────────────────────────────────────────────────────────────
function pageHistorique(){
  const sp=SPACES[currentSpace], h=HISTORY[currentSpace]||[];
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:.25rem">
    <div class="page-title">Historique</div>
    <span class="badge" style="background:${sp.colorLight};color:${sp.colorText}">${sp.brand} · ${sp.storeLabel}</span>
  </div>
  <div class="page-sub">${h.length} imports enregistrés</div>
  <div class="table-wrap"><table>
    <thead><tr><th>Fichier</th><th>Type</th><th>Date</th><th>Lignes</th><th>Statut</th></tr></thead>
    <tbody>${h.map(f=>`<tr>
      <td style="font-size:12px">${f.file}</td>
      <td><span class="badge badge-${f.type==='ventes'?'info':'accent'}">${f.type}</span></td>
      <td style="color:var(--muted);font-size:12px">${f.date}</td>
      <td>${f.lines}</td>
      <td><span class="badge badge-${f.status==='ok'?'ok':'warn'}">${f.status==='ok'?'OK':'Partiel'}</span></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}
</script>
</body>
</html>
